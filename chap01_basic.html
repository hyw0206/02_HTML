<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>라인컴퓨터아트학원</title>
  </head>
  <body>
  <!--
    h1 ~ h6 : 제목에 대한 예제
            : 의미론 적으로는 h1이 가장 큰 제목, h6가 가장 작은 제목
  -->
    <h1>이것은 h1 태그입니다</h1>
    <h2>이것은 h2 태그입니다</h2>
    <h3>이것은 h3 태그입니다</h3>
    <h4>이것은 h4 태그입니다</h4>
    <h5>이것은 h5 태그입니다</h5>
    <h6>이것은 h6 태그입니다</h6>

    <span>이것은 일반<br />글자입니다&nbsp;</span>

    <hr />

    <strong>굵게 표시를 합니다</strong>
    <mark>형광펜 효과를 넣습니다</mark>

    <ul>
      <li>아이템</li>
      <li>아이템</li>
      <li>아이템</li>
    </ul>
    <ol type="i" start="3">
      <li>아이템</li>
      <li>아이템</li>
      <li>아이템</li>
    </ol>

    <table border="1">
      <thead>
        <tr>
          <th>1-1</th>
          <th>1-2</th>
          <th>1-3</th>
        </tr>
      </thead>

        <tr>
          <td>2-1</td>
          <td>2-2</td>
          <td>2-3</td>
        </tr>

    </table>

    <table border="1">
      <thead>
        <tr>
          <th>1-1</th>
          <th>1-2</th>
          <th>1-3</th>
        </tr>
      </thead>

        <tr>
          <td>2-1</td>
          <td colspan="2">2-2</td>
        </tr>

    </table>

    <table border="1">
      <thead>
        <tr>
          <th>1-1</th>
          <th>1-2</th>
          <th>1-3</th>
        </tr>
      </thead>

      <tr>
        <td rowspan="2">2-1</td>
        <td colspan="2">2-2</td>
      </tr>
      <tr>
        <td>2-1</td>
        <td colspan="2">2-2</td>
      </tr>

    </table>

    <div>이것은 div</div>
